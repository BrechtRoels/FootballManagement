# Render Blueprint for the FastAPI backend.
# In Render: New + → Blueprint → connect this repo. Then set the secret env vars
# marked `sync: false` (DATABASE_URL, CORS_ORIGINS, FIRST_ADMIN_PASSWORD) in the
# dashboard. See DEPLOY.md for the full walkthrough.
services:
  - type: web
    name: ksvjabbeke-api
    runtime: python
    rootDir: backend
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: SECRET_KEY
        generateValue: true # Render generates a strong value automatically
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "480"
      - key: DATABASE_URL
        sync: false # paste the Supabase pooled connection string (port 6543)
      - key: CORS_ORIGINS
        sync: false # your Vercel URL, e.g. https://ksvjabbeke.vercel.app
      - key: FIRST_ADMIN_EMAIL
        value: admin@ksvjabbeke.be
      - key: FIRST_ADMIN_NAME
        value: KSV Jabbeke Secretariaat
      - key: FIRST_ADMIN_PASSWORD
        sync: false # choose a strong admin password
